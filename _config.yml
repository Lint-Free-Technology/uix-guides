# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that.

title: UIX Guides
email: your-email@domain.com
author: Lint-Free-Technology

# Copyright setting
copyright: "Unpublished Work (cleft) 2017-{currentYear} {author}"

description: >-
  Documentation and guides for UIX (User Interface Experience).
  A comprehensive resource for building better user interfaces.

baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site
favicon: "" # the favicon for your site

# Yat date format
# refer to https://shopify.github.io/liquid/filters/date/ if you want to customize this
yat:
  date_format: "%b %d, %Y"

# If you want more debug log, you can set true
# debug: false

# If you don't want transparent header, you can set false
# header_transparent: true

# If you want to change the content width, you can set to another value
# content_width: "920px"

# Google analytics - GA4
# google_analytics: [Measurement ID]
# enableDNT: "false"

# If you want to generate website sitemap, you can set true
# sitemap: false

# If you want to change site language, you can set lang option
# lang: "en"  # default lang is en

# You can choose a theme color
# Default theme colors as below:
# coolblack: #090a0b
# spacegrey: #353535
# snowwhite: #ffffff
#
# theme_color: snowwhite
#
# Custom color as below:
# theme_color: "#882250"

# You can choose a brand color
# Default brand colors as below:
# orangered: #ff5100
# greatgold: #f2cb05
# greenblue: #389092
#
# brand_color: orangered
#
# Custom color as below:
# brand_color: "#1a8e42"

# Night/Dark mode
# Default mode is "auto", "auto" is for auto nightshift
# (19:00 - 07:00), "manual" is for manual toggle, and
# "on/off" is for default on/off.
#
# night_mode: "auto"

# Pagination setting
# paginate: 5

# Build settings
markdown: kramdown
kramdown:
  input: GFM

# Use remote theme for GitHub Pages compatibility
remote_theme: jeffreytse/jekyll-theme-yat

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-spaceship
  - jekyll-remote-theme
